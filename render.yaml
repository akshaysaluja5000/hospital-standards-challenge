services:
  - type: web
    name: hospital-standards-challenge
    runtime: node
    buildCommand: npm install && npm run build && cp node_modules/connect-pg-simple/table.sql dist/table.sql
    startCommand: node dist/index.cjs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hospital-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        value: hsc_secret_2026_safe
