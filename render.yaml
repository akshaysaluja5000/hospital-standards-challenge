services:
  - type: web
    name: hospital-standards-challenge
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: compliance-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
